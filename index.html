// Step3: 特性チェックリスト（非診断・複数選択OK、いびきラボ風）
const OnboardingChecklist = ({ onFinish }) => {
  const [selected, setSelected] = useState(new Set());
  const toggle = (label) => {
    const next = new Set(selected);
    if (next.has(label)) next.delete(label);
    else next.add(label);
    setSelected(next);
  };
  return (
    <div style={{ height: "100%", display: "flex", flexDirection: "column" }}>
      <StatusBar />
      <div style={{
        padding: "12px 20px", borderBottom: "1px solid #F0E8DC",
        display: "flex", alignItems: "center", gap: 8,
      }}>
        <span style={{ fontSize: 20 }}>🌱</span>
        <span style={{ fontSize: 14, fontWeight: 700, color: "#3D3425" }}>お子さんの傾向</span>
        <div style={{ flex: 1 }} />
        <div style={{ display: "flex", gap: 4 }}>
          {[1, 2, 3].map(i => (
            <div key={i} style={{
              width: 8, height: 8, borderRadius: 4,
              background: i <= 3 ? "#E8A87C" : "#E8DDD0",
            }} />
          ))}
        </div>
      </div>

      <div style={{ padding: "16px 20px 8px" }}>
        <h2 style={{ fontSize: 17, fontWeight: 800, color: "#3D3425", margin: "0 0 6px", lineHeight: 1.4 }}>
          ゆうくんに当てはまるものを<br />教えてください
        </h2>
        <p style={{ fontSize: 12, color: "#8B7D6B", margin: 0, lineHeight: 1.6 }}>
          複数選んでOK・後からいつでも変更できます<br />
          <span style={{ color: "#A89880" }}>※ 診断はしません。声かけの参考にするだけです</span>
        </p>
      </div>

      <div style={{ flex: 1, overflowY: "auto", padding: "8px 16px" }}>
        <div style={{ display: "flex", flexDirection: "column", gap: 8 }}>
          {TRAIT_CHECKLIST.map(item => {
            const on = selected.has(item.label);
            return (
              <button key={item.label} onClick={() => toggle(item.label)} style={{
                padding: "12px 14px", borderRadius: 14,
                border: `2px solid ${on ? "#E8A87C" : "#E8DDD0"}`,
                background: on ? "#FFF3E6" : "white",
                display: "flex", alignItems: "center", gap: 12,
                textAlign: "left",
              }}>
                <span style={{ fontSize: 24 }}>{item.emoji}</span>
                <div style={{ flex: 1 }}>
                  <div style={{ fontSize: 14, fontWeight: 700, color: "#3D3425" }}>{item.label}</div>
                  <div style={{ fontSize: 11, color: "#8B7D6B", marginTop: 2 }}>{item.hint}</div>
                </div>
                <div style={{
                  width: 22, height: 22, borderRadius: 11,
                  border: `2px solid ${on ? "#E8A87C" : "#D4C4B0"}`,
                  background: on ? "#E8A87C" : "transparent",
                  display: "flex", alignItems: "center", justifyContent: "center",
                  color: "white", fontSize: 13, fontWeight: 800,
                }}>{on ? "✓" : ""}</div>
              </button>
            );
          })}
        </div>
      </div>

      <div style={{ padding: "12px 16px 20px", borderTop: "1px solid #F0E8DC" }}>
        <button onClick={onFinish} style={{
          width: "100%", padding: "14px", borderRadius: 14,
          border: "none", background: "linear-gradient(135deg, #E8A87C, #D4845A)",
          color: "white", fontSize: 15, fontWeight: 700,
          boxShadow: "0 4px 16px rgba(232,168,124,0.35)",
        }}>
          {selected.size > 0 ? `${selected.size}件で進む` : "スキップして進む"}
        </button>
      </div>
    </div>
  );
};

            color: tab === t.key ? "white" : "#8B7D6B",
          }}>{t.label}</button>
        ))}
      </div>

      <div style={{ flex: 1, overflowY: "auto", padding: "8px 16px 16px" }}>
        {tab === "traits" && (
          <>
            <div style={{
              background: "linear-gradient(135deg, #FFF3E6, #FFEBD4)",
              borderRadius: 14, padding: "12px 14px", marginBottom: 12,
              border: "1px solid #F0DCC8",
            }}>
              <p style={{ fontSize: 11, color: "#8B7D6B", margin: 0, fontWeight: 700 }}>今月の傾向</p>
              <p style={{ fontSize: 13, color: "#3D3425", margin: "4px 0 0", lineHeight: 1.6 }}>
                <strong>🚂 乗り物</strong>への集中時間が長く、<strong>🔊 大きな音</strong>への苦手反応が3回
              </p>
            </div>

            <div style={{ display: "flex", gap: 6, marginBottom: 10 }}>
              <button style={{
                flex: 1, padding: "10px", borderRadius: 10,
                border: "2px dashed #E8A87C", background: "white",
                fontSize: 12, fontWeight: 700, color: "#D4845A",
              }}>+ 好きを記録</button>
              <button style={{
                flex: 1, padding: "10px", borderRadius: 10,
                border: "2px dashed #B8A89A", background: "white",
                fontSize: 12, fontWeight: 700, color: "#8B7D6B",
              }}>+ 苦手を記録</button>
            </div>

            <div style={{ display: "flex", flexDirection: "column", gap: 8 }}>
              {TRAIT_LOGS.map((l, i) => (
                <div key={i} style={{
                  display: "flex", alignItems: "center", gap: 10,
                  background: "white", borderRadius: 12,
                  border: `1px solid ${l.type === "like" ? "#F0DCC8" : "#E4DCD0"}`,
                  padding: "10px 12px",
                }}>
                  <div style={{
                    width: 36, height: 36, borderRadius: 18,
                    background: l.type === "like" ? "#FFF3E6" : "#ECE6DE",
                    display: "flex", alignItems: "center", justifyContent: "center",
                    fontSize: 18,
                  }}>{l.emoji}</div>
                  <div style={{ flex: 1 }}>
                    <div style={{ fontSize: 13, color: "#3D3425", fontWeight: 600 }}>{l.text}</div>
                    <div style={{ fontSize: 10, color: "#A89880", marginTop: 2 }}>
                      {l.date}・{l.type === "like" ? "好き" : "苦手"}
                    </div>
                  </div>
                </div>
              ))}
            </div>
          </>
        )}

        {tab === "habits" && (
          <>
            <div style={{
              background: "linear-gradient(135deg, #E6F2ED, #D4E8DC)",
              borderRadius: 14, padding: "12px 14px", marginBottom: 12,
              border: "1px solid #C5D9CA",
            }}>
              <p style={{ fontSize: 11, color: "#5A7A60", margin: 0, fontWeight: 700 }}>
                🎯 200回で習慣になる
              </p>
              <p style={{ fontSize: 12, color: "#3D4F3A", margin: "4px 0 0", lineHeight: 1.6 }}>
                できた瞬間（60秒以内）にほめると定着しやすいです
              </p>
            </div>

            <div style={{ display: "flex", flexDirection: "column", gap: 10 }}>
              {HABITS.map((h, i) => {
                const pct = Math.min(100, Math.round(h.count / h.goal * 100));
                return (
                  <div key={i} style={{
                    background: "white", borderRadius: 14, padding: "12px 14px",
                    border: "1px solid #E8DDD0",
                  }}>
                    <div style={{ display: "flex", alignItems: "center", gap: 10, marginBottom: 8 }}>
                      <span style={{ fontSize: 22 }}>{h.emoji}</span>
                      <div style={{ flex: 1 }}>
                        <div style={{ fontSize: 13, color: "#3D3425", fontWeight: 700 }}>{h.label}</div>
                        <div style={{ fontSize: 10, color: "#A89880" }}>
                          {h.count} / {h.goal} 回
                        </div>
                      </div>
                      <button style={{
                        padding: "6px 12px", borderRadius: 10, border: "none",
                        background: "#E8A87C", color: "white", fontSize: 12, fontWeight: 700,
                      }}>+1</button>
                    </div>
                    <div style={{
                      height: 6, borderRadius: 3, background: "#F0E8DC", overflow: "hidden",
                    }}>
                      <div style={{
                        width: `${pct}%`, height: "100%",
                        background: "linear-gradient(90deg, #E8A87C, #D4845A)",
                      }} />
                    </div>
                  </div>
                );
              })}

              <button style={{
                padding: "12px", borderRadius: 12, marginTop: 4,
                border: "2px dashed #E8A87C", background: "white",
                fontSize: 13, fontWeight: 700, color: "#D4845A",
              }}>+ 習慣を追加する</button>
            </div>
          </>
        )}
      </div>

      <BottomNav active={SCREENS.LOG} onChange={onNav} />
    </div>
  );
};

// 特性プロフィール画面（チェックリストの結果を表示・編集）
const ProfileScreen = ({ onNav }) => (
  <div style={{ height: "100%", display: "flex", flexDirection: "column" }}>
    <StatusBar />
    <div style={{ padding: "14px 20px 8px" }}>
      <h2 style={{ fontSize: 20, fontWeight: 800, color: "#3D3425", margin: 0 }}>ゆうくんの特性</h2>
      <p style={{ fontSize: 11, color: "#8B7D6B", margin: "2px 0 0" }}>
        登録した傾向（いつでも編集可）
      </p>
    </div>

    <div style={{ flex: 1, overflowY: "auto", padding: "12px 16px" }}>
      <div style={{
        background: "#FFF3E6", borderRadius: 14, padding: "12px 14px",
        marginBottom: 12, border: "1px solid #F0DCC8",
      }}>
        <p style={{ fontSize: 11, color: "#8B7D6B", margin: 0 }}>
          ℹ️ ここで登録した情報は、声かけ提案の精度を高めるために使われます。診断には使いません。
        </p>
      </div>

      <div style={{ display: "flex", flexDirection: "column", gap: 8 }}>
        {TRAIT_CHECKLIST.slice(0, 4).map(item => (
          <div key={item.label} style={{
            padding: "12px 14px", borderRadius: 12,
            border: "2px solid #E8A87C", background: "#FFF3E6",
            display: "flex", alignItems: "center", gap: 10,
          }}>
            <span style={{ fontSize: 22 }}>{item.emoji}</span>
            <div style={{ flex: 1, fontSize: 13, fontWeight: 700, color: "#3D3425" }}>{item.label}</div>
            <span style={{ color: "#E8A87C", fontWeight: 800 }}>✓</span>
          </div>
        ))}
      </div>

      <button style={{
        marginTop: 16, width: "100%", padding: "12px", borderRadius: 12,
        border: "2px solid #E8DDD0", background: "white",
        fontSize: 13, fontWeight: 700, color: "#6B5E4F",
      }}>＋ 傾向を追加・編集する</button>
    </div>

    <BottomNav active={SCREENS.PROFILE} onChange={onNav} />
  </div>
);

const ResultScreen = ({ data, onBack }) => (
  <div style={{ height: "100%", display: "flex", flexDirection: "column" }}>
    <StatusBar />
    <div style={{
      padding: "12px 16px", display: "flex", alignItems: "center",
      gap: 8, borderBottom: "1px solid #F0E8DC",
    }}>
      <button onClick={onBack} style={{
        background: "none", border: "none", fontSize: 20, padding: "4px 8px", color: "#6B5E4F",
      }}>←</button>
      <span style={{ fontSize: 15, fontWeight: 700, color: "#3D3425" }}>リフレーミング結果</span>
    </div>

    <div style={{
      flex: 1, overflowY: "auto", padding: "16px",
      display: "flex", flexDirection: "column", gap: 14,
    }}>
      <div style={{ background: "#F5EFEA", borderRadius: 16, padding: "14px" }}>
        <p style={{ fontSize: 11, color: "#8B7D6B", margin: "0 0 6px", fontWeight: 600 }}>
          😤 こう言いたくなる気持ち
        </p>
        <p style={{
          fontSize: 14, color: "#6B5E4F", margin: 0, lineHeight: 1.6,
          textDecoration: "line-through", opacity: 0.7,
        }}>
          {data.original}
        </p>
      </div>

      <div>
        <div style={{
          display: "flex", justifyContent: "space-between", alignItems: "center",

        }}>
          <p style={{ fontSize: 11, color: "#8B7D6B", margin: 0, fontWeight: 600 }}>
            🌱 {data.childName}への声掛けアイデア
          </p>
          {data.basis && (

              {r}

        <button style={{
          width: "100%", padding: "10px", borderRadius: 10,
          border: "1px dashed #D4C4B0", background: "transparent",

        }}>🔄 別の案を生成</button>

      <div style={{
        background: "linear-gradient(135deg, #E6F2ED, #D4E8DC)",

      <div style={{ display: "flex", gap: 8 }}>
        <button style={{
          flex: 1, padding: "14px", borderRadius: 12,
          border: "2px solid #E8DDD0", background: "white",
          fontSize: 13, color: "#6B5E4F", fontWeight: 600,
        }}>😊 効果あり</button>
        <button style={{
          flex: 1, padding: "14px", borderRadius: 12,
          border: "2px solid #E8DDD0", background: "white",
          fontSize: 13, color: "#6B5E4F", fontWeight: 600,
        }}>😕 効かなかった</button>
      </div>
    </div>

function App() {
  const [screen, setScreen] = useState(SCREENS.ONBOARDING_1);
  const [resultData, setResultData] = useState(null);

  const handleSelect = (keywords) => {
    const data = REFRAME_DATA[keywords] || REFRAME_DATA["片付け　拒否"];
    setResultData(data);
    setScreen(SCREENS.RESULT);
  };

  return (
    <div style={{
      minHeight: "100vh", display: "flex", flexDirection: "column",
      alignItems: "center", justifyContent: "center",
      background: "linear-gradient(160deg, #2D2A3E 0%, #1a1a2e 100%)",
      padding: "40px 20px",
    }}>
      <div style={{ marginBottom: 24, textAlign: "center" }}>
        <h1 style={{
          color: "white", fontSize: 16, fontWeight: 600,
          margin: "0 0 4px", opacity: 0.6, letterSpacing: 2,
        }}>wakuLog MVP Mockup v2</h1>
        <p style={{ color: "white", fontSize: 12, opacity: 0.3, margin: 0 }}>
          04/14 議事録反映版
        </p>
      </div>

      <Phone>
        {screen === SCREENS.ONBOARDING_1 && (
          <OnboardingScreen1 onNext={() => setScreen(SCREENS.ONBOARDING_2)} />
        )}
        {screen === SCREENS.ONBOARDING_2 && (
          <OnboardingNickname onNext={() => setScreen(SCREENS.ONBOARDING_3)} />
        )}
        {screen === SCREENS.ONBOARDING_3 && (
          <OnboardingChecklist onFinish={() => setScreen(SCREENS.HOME)} />
        )}
        {screen === SCREENS.HOME && (
          <HomeScreen
            onSelect={handleSelect}
            onKeywordSubmit={handleSelect}
            onNav={setScreen}
          />
        )}
        {screen === SCREENS.LOG && <LogScreen onNav={setScreen} />}
        {screen === SCREENS.PROFILE && <ProfileScreen onNav={setScreen} />}
        {screen === SCREENS.RESULT && (
          <ResultScreen data={resultData} onBack={() => setScreen(SCREENS.HOME)} />
        )}
      </Phone>

      <div style={{ marginTop: 20, display: "flex", gap: 6, flexWrap: "wrap", justifyContent: "center", maxWidth: 560 }}>
        {[
          { label: "①起動", s: SCREENS.ONBOARDING_1 },
          { label: "②ニックネーム", s: SCREENS.ONBOARDING_2 },
          { label: "③特性チェック", s: SCREENS.ONBOARDING_3 },
          { label: "ホーム", s: SCREENS.HOME },
          { label: "ログ", s: SCREENS.LOG },
          { label: "特性", s: SCREENS.PROFILE },
          { label: "変換結果", s: SCREENS.RESULT },
        ].map(b => (
          <button key={b.label} onClick={() => {
            if (b.s === SCREENS.RESULT) setResultData(REFRAME_DATA["片付け　拒否"]);
            setScreen(b.s);
          }} style={{
            padding: "8px 14px", borderRadius: 8,
            border: "1px solid rgba(255,255,255,0.15)",
            background: screen === b.s ? "rgba(232,168,124,0.3)" : "rgba(255,255,255,0.05)",
            color: "white", fontSize: 12,
          }}>{b.label}</button>
        ))}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
